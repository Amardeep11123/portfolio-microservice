version: '3.9'

services:
  django:
    build: ./backend/django_gateway
    expose:
      - "8000"
    depends_on:
      - fastapi
      - db
    env_file:
      - .env

  fastapi:
    build: ./backend/fastapi_service
    expose:
      - "8001"

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - django

volumes:
  postgres_data: